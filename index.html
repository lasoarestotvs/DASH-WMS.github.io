<!DOCTYPE html>
<html lang="pt-BR">

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Adicionando transições suaves para o render do JS */
    .fade-in { animation: fadeIn 0.5s ease-in-out; }

      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="flex h-screen bg-slate-50 overflow-hidden">

  <!-- Sidebar Lateral -->
  <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-20 flex-shrink-0">
    <div class="p-6 border-b border-slate-800 flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-500 rounded flex items-center justify-center font-bold text-white text-xl">W</div>
      <div>
        <h1 class="text-white font-bold text-lg leading-tight">TOTVS WMS</h1>
        <p class="text-xs text-blue-400">Varejo Supermercados</p>
      </div>
    </div>
    
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto" id="sidebar-menu">
      <!-- Gerado via JS -->
    </nav>
    
    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-slate-700 border-2 border-blue-500 flex items-center justify-center text-white font-bold">
          PO

        <div>
          <p class="text-sm text-white font-medium">Product Owner</p>

        </div>
      </div>
    </div>
  </aside>

  <!-- Área Principal -->
  <main class="flex-1 flex flex-col overflow-hidden relative">
    
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10 flex-shrink-0">
      <h2 id="header-title" class="text-xl font-bold text-slate-800">Visão Geral</h2>
      
      <div class="flex items-center gap-6">
        <div class="relative">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
          <input 
            type="text" 
            placeholder="Buscar SKU, Lote ou Endereço..." 
            class="pl-10 pr-4 py-2 bg-slate-100 border-transparent rounded-lg text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none w-64 transition-all"
          />
        </div>
        <button class="relative p-2 text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-100">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
      </div>
    </header>

    <!-- Conteúdo Rolável -->
    <div id="main-content" class="flex-1 overflow-y-auto p-8">
      <!-- O conteúdo das abas será injetado aqui via JS -->
    </div>

  <script>

    const produtividadeTable = [

      { nome: 'Maria Santos', funcao: 'Empilhador (Frios)', caixasHora: 185, status: 'Ativo', performance: 'Na Meta' },

      { nome: 'Ana Costa', funcao: 'Conferente', caixasHora: 300, status: 'Ativo', performance: 'Acima da Meta' },

    const fefoData = {

        { faixa: '0 a 10 dias', qtd: 5400, color: 'bg-orange-500', vr: 'R$ 31k' },

        { faixa: '31 a 60 dias', qtd: 25000, color: 'bg-blue-400', vr: 'R$ 120k' },

      ],

        { sku: '10293', desc: 'IOGURTE MORANGO 170G', lote: 'L-8821', validade: '08/04/2026', qtd: '450 un', local: 'Rua 02 - N3', status: 'Vencido' },
        { sku: '48291', desc: 'QUEIJO MUSSARELA 1KG', lote: 'L-9923', validade: '11/04/2026', qtd: '120 cx', local: 'Rua 03 - N1', status: 'Vence em 2 dias' },
        { sku: '83712', desc: 'PRESUNTO COZIDO FATIADO', lote: 'L-1120', validade: '14/04/2026', qtd: '85 cx', local: 'Rua 03 - N2', status: 'Vence em 5 dias' },
        { sku: '99281', desc: 'LEITE FERMENTADO 6X80G', lote: 'L-4421', validade: '19/04/2026', qtd: '320 cx', local: 'Rua 01 - N4', status: 'Vence em 10 dias' },
        { sku: '55123', desc: 'REQUEIJAO TRADICIONAL 200G', lote: 'L-5522', validade: '24/04/2026', qtd: '150 cx', local: 'Rua 02 - N1', status: 'Vence em 15 dias' },
      ]

    const expedicaoData = {
      kpis: { paletesProntos: 345, paletesCarregados: 820, veiculosDoca: 6, veiculosExpedidos: 14 },
      stageOut: [
        { id: 'Stage 01 (Rota Norte)', ocupacao: 95, paletes: 45, status: 'Lotado', color: 'bg-red-500' },
        { id: 'Stage 02 (Rota Sul)', ocupacao: 65, paletes: 32, status: 'Normal', color: 'bg-blue-500' },
        { id: 'Stage 03 (Hiper Centro)', ocupacao: 20, paletes: 10, status: 'Livre', color: 'bg-emerald-500' },
        { id: 'Stage 04 (Express 24h)', ocupacao: 85, paletes: 25, status: 'Atenção', color: 'bg-amber-400' },
      ],
      docas: [
        { id: 'Doca 01', veiculo: 'Camião Toco', placa: 'ABC-1234', rota: 'Rota Norte', progresso: 85, status: 'A Carregar' },
        { id: 'Doca 02', veiculo: 'Carreta 3 Eixos', placa: 'XYZ-9876', rota: 'Hiper Centro', progresso: 100, status: 'Pronto a Sair' },
        { id: 'Doca 03', veiculo: '-', placa: '-', rota: '-', progresso: 0, status: 'Livre' },
        { id: 'Doca 04', veiculo: 'Truck Baú', placa: 'DEF-5678', rota: 'Rota Sul', progresso: 15, status: 'A Iniciar' },
      ],
      veiculosCarregados: [
        { loja: 'Loja 12 - Centro', veiculo: 'Camião (XYZ-9876)', paletes: 28, hora: '16:15', status: 'Aguardar NFe', statusColor: 'text-amber-600 bg-amber-50 border-amber-200' },
        { loja: 'Loja 05 - Bairro', veiculo: 'Van (JKL-3456)', paletes: 12, hora: '15:30', status: 'Em Trânsito', statusColor: 'text-blue-700 bg-blue-50 border-blue-200' },
        { loja: 'Loja 08 - Shopping', veiculo: 'Truck (MNO-7890)', paletes: 24, hora: '14:45', status: 'Em Trânsito', statusColor: 'text-blue-700 bg-blue-50 border-blue-200' },
        { loja: 'Loja 02 - Express', veiculo: 'VUC (PQR-1234)', paletes: 8, hora: '16:40', status: 'Liberado Portaria', statusColor: 'text-emerald-700 bg-emerald-50 border-emerald-200' },
      ]
    };

    // --- Sistema de Temas e Componentes Base ---
    const baseThemes = {
      blue: { border: 'border-blue-600', bg: 'bg-blue-50', text: 'text-blue-600', bar: 'bg-blue-500', bulb: 'bg-blue-600' },
      red: { border: 'border-red-500', bg: 'bg-red-50', text: 'text-red-600', bar: 'bg-red-500', bulb: 'bg-red-600' },
      green: { border: 'border-emerald-500', bg: 'bg-emerald-50', text: 'text-emerald-600', bar: 'bg-emerald-500', bulb: 'bg-emerald-600' },
      purple: { border: 'border-purple-500', bg: 'bg-purple-50', text: 'text-purple-600', bar: 'bg-purple-500', bulb: 'bg-purple-600' },
      amber: { border: 'border-amber-500', bg: 'bg-amber-50', text: 'text-amber-600', bar: 'bg-amber-500', bulb: 'bg-amber-500' },
      indigo: { border: 'border-indigo-500', bg: 'bg-indigo-50', text: 'text-indigo-600', bar: 'bg-indigo-500', bulb: 'bg-indigo-500' },
    };

    function KpiCard({ title, value, unit, icon, trend, trendValue, alert, theme }) {
      const t = baseThemes[theme || (alert ? 'red' : 'blue')];
      const iconHtml = icon ? `<div class="p-2 rounded-lg ${t.bg} ${t.text}"><i data-lucide="${icon}" class="w-5 h-5"></i></div>` : '';
      const trendIcon = trend === 'up' ? '<i data-lucide="trending-up" class="w-3.5 h-3.5 mr-1"></i>' : trend === 'down' ? '<i data-lucide="trending-down" class="w-3.5 h-3.5 mr-1"></i>' : '';
      const trendClass = trend === 'up' ? 'text-green-600' : trend === 'down' ? 'text-red-500' : 'text-slate-400';

      return `
        <div class="bg-white p-4 rounded-xl border-l-4 shadow-sm flex flex-col justify-between ${t.border}">
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-slate-500 text-sm font-semibold">${title}</h3>
            ${iconHtml}
          </div>
          <div class="flex items-baseline gap-1">
            <span class="text-3xl font-bold text-slate-800">${value}</span>
            <span class="text-slate-500 text-sm">${unit}</span>
          </div>
          <div class="text-xs mt-2 flex items-center font-medium ${trendClass}">
            ${trendIcon} ${trendValue}
          </div>
        </div>
      `;
    }

    function VolumeProgressCard({ title, icon, agendados, conferidos, unitText, formatK = false, theme = 'blue', targetLabel = 'agendados' }) {
      const t = baseThemes[theme];
      const valConferidos = formatK ? (conferidos / 1000).toFixed(1) + 'k' : conferidos;
      const valAgendados = formatK ? (agendados / 1000).toFixed(1) + 'k' : agendados;
      const percent = Math.round((conferidos / agendados) * 100);
      const iconHtml = icon ? `<div class="p-2 rounded-lg ${t.bg} ${t.text}"><i data-lucide="${icon}" class="w-5 h-5"></i></div>` : '';

      return `
        <div class="bg-white p-4 rounded-xl border-l-4 shadow-sm flex flex-col justify-between ${t.border}">
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-slate-500 text-sm font-semibold">${title}</h3>
            ${iconHtml}
          </div>
          <div class="flex items-baseline gap-1">
            <span class="text-3xl font-bold text-slate-800">${valConferidos}</span>
            <span class="text-slate-500 text-sm">${unitText}</span>
          </div>
          <div class="mt-2">
            <div class="flex justify-between text-xs text-slate-500 mb-1">
              <span>de ${valAgendados} ${targetLabel}</span>
              <span class="font-bold ${t.text}">${percent}%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-1.5">
              <div class="h-1.5 rounded-full ${t.bar}" style="width: ${percent}%"></div>
            </div>
          </div>
        </div>
      `;
    }

    function ThermometerCard({ title, subtitle, value, unit, percentage, trend, trendValue, theme = 'blue' }) {
      const t = baseThemes[theme];
      const safePct = Math.min(100, Math.max(0, percentage));
      const trendIcon = trend === 'up' ? '<i data-lucide="trending-up" class="w-3.5 h-3.5"></i>' : trend === 'down' ? '<i data-lucide="trending-down" class="w-3.5 h-3.5"></i>' : `<span class="inline-block w-2 h-2 rounded-full ${t.bar}"></span>`;
      const trendClass = trend === 'up' ? 'text-green-600' : trend === 'down' ? 'text-red-500' : 'text-slate-500';
      const trendText = trendValue || `${percentage}% ${theme === 'red' ? 'nível crítico' : 'da meta'}`;

      return `
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between relative overflow-hidden group">
          <div class="absolute -right-4 -bottom-4 w-24 h-24 rounded-full opacity-[0.03] ${t.bar}"></div>
          <div class="flex flex-col justify-between h-full z-10 w-3/4">
            <div>
              <h3 class="text-slate-700 text-sm font-bold mb-0.5">${title}</h3>
              <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">${subtitle}</p>
            </div>
            <div class="mt-4 mb-1">
              <span class="text-3xl font-black ${t.text}">${value}</span>
              <span class="text-slate-500 text-sm ml-1 font-medium">${unit}</span>
            </div>
            <div class="flex items-center gap-1.5 text-xs font-semibold ${trendClass}">
               ${trendIcon} ${trendText}
            </div>
          </div>
          <div class="flex flex-col items-center justify-end h-28 w-12 pt-2 z-10">
            <div class="w-3.5 flex-1 bg-slate-100 rounded-t-full relative shadow-inner border border-slate-200/50 flex flex-col justify-end overflow-hidden z-0">
               <div class="absolute inset-0 flex flex-col justify-between py-1 opacity-20">
                 <div class="w-full h-[1px] bg-slate-800"></div><div class="w-full h-[1px] bg-slate-800"></div>
                 <div class="w-full h-[1px] bg-slate-800"></div><div class="w-full h-[1px] bg-slate-800"></div>
               </div>
               <div class="w-full transition-all duration-1000 relative ${t.bar}" style="height: ${safePct}%">
                 <div class="absolute top-0 right-0 w-1/2 h-full bg-white/20"></div>
               </div>
               <div class="absolute top-[20%] left-0 w-full border-t-2 border-slate-800/30 z-10"></div>
            </div>
            <div class="w-8 h-8 rounded-full shadow-md -mt-2 z-10 border-2 border-white flex items-center justify-center relative ${t.bulb}">
               <div class="absolute top-1 right-1 w-2.5 h-2.5 rounded-full bg-white/40 blur-[1px]"></div>
               <div class="absolute -inset-1 rounded-full opacity-20 animate-pulse ${t.bar}"></div>
            </div>
          </div>
        </div>
      `;
    }

    // --- Renderização de Abas Específicas ---

    function renderVisaoGeral() {

          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            ${ThermometerCard({ title: 'Recebimento', subtitle: 'Cargas Processadas', value: recebimentoData.cargas.recebidas, unit: 'cargas', percentage: Math.round((recebimentoData.cargas.recebidas / recebimentoData.cargas.agendadas) * 100), theme: 'blue', trend: 'up', trendValue: '+5% vs ontem' })}
            ${ThermometerCard({ title: 'Separação', subtitle: 'Volume Concluído', value: '11.4k', unit: 'cx', percentage: 72, theme: 'purple', trend: 'up', trendValue: '+12% vs ontem' })}
            ${ThermometerCard({ title: 'Produtividade', subtitle: 'Tarefas Concluídas', value: '4.8k', unit: 'tarefas', percentage: 85, theme: 'green', trend: 'none', trendValue: 'de 5.6k gerado' })}
            ${ThermometerCard({ title: 'Pressão Operacional', subtitle: 'Risco FEFO/Atrasos', value: '3.2k', unit: 'itens', percentage: 85, theme: 'red', trend: 'down', trendValue: '-2% vs ontem' })}
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <div class="flex justify-between items-center mb-6">
                <div>
                  <h3 class="font-bold text-slate-800">Fluxo da Doca (Recebimento)</h3>
                  <p class="text-sm text-slate-500">Progresso e gargalo de veículos agendados.</p>
                </div>
                <button onclick="setMenu('recebimento')" class="text-sm font-semibold text-blue-600 hover:text-blue-800 transition-colors">Ver Detalhes</button>
              </div>
              <div class="flex-1 flex items-center">
                <div class="flex w-full justify-between gap-3 text-center">
                  <div class="flex-1 bg-slate-50 border border-slate-200 rounded-lg py-4 px-2">
                    <p class="text-xs font-medium text-slate-500 mb-1">Agendadas</p>
                    <h4 class="text-2xl font-bold text-slate-800">${recebimentoData.cargas.agendadas}</h4>
                  </div>
                  <div class="flex-1 bg-blue-50 border border-blue-200 rounded-lg py-4 px-2">
                    <p class="text-xs font-medium text-blue-600 mb-1">Recebidas</p>
                    <h4 class="text-2xl font-bold text-blue-800">${recebimentoData.cargas.recebidas}</h4>
                  </div>
                  <div class="flex-1 bg-indigo-50 border border-indigo-200 rounded-lg py-4 px-2 relative">
                    <p class="text-xs font-medium text-indigo-600 mb-1">Conferidas</p>
                    <h4 class="text-2xl font-bold text-indigo-800">${recebimentoData.cargas.conferidas}</h4>
                    <div class="absolute -top-2 -right-2 bg-amber-400 text-amber-900 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">Gargalo</div>
                  </div>
                  <div class="flex-1 bg-green-50 border border-green-200 rounded-lg py-4 px-2">
                    <p class="text-xs font-medium text-green-600 mb-1">Armazenadas</p>
                    <h4 class="text-2xl font-bold text-green-800">${recebimentoData.cargas.armazenadas}</h4>
                  </div>
                </div>
              </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <div class="flex justify-between items-center mb-6">
                <div>
                  <h3 class="font-bold text-slate-800">Status das Linhas de Separação</h3>
                  <p class="text-sm text-slate-500">Andamento das rotas para expedição.</p>
                </div>
                <button onclick="setMenu('separacao')" class="text-sm font-semibold text-blue-600 hover:text-blue-800 transition-colors">Ver Detalhes</button>
              </div>
              <div class="flex-1 flex flex-col justify-center gap-4">
                ${separacaoData.ondas.slice(0,3).map(onda => `
                  <div>
                    <div class="flex justify-between text-xs font-semibold mb-1">
                      <span class="text-slate-700">${onda.id}</span>
                      <span class="${onda.progresso === 100 ? 'text-green-600' : 'text-slate-600'}">${onda.progresso}%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                      <div class="h-2 rounded-full transition-all duration-1000 ${onda.progresso === 100 ? 'bg-green-500' : 'bg-blue-600'}" style="width: ${onda.progresso}%"></div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
              <h3 class="font-bold text-slate-800 mb-4">Quadro de Atenção Global</h3>
              <div class="space-y-3">
                <div class="flex items-center gap-4 p-3 bg-red-50 border border-red-100 rounded-lg">
                  <i data-lucide="alert-triangle" class="text-red-500 flex-shrink-0 w-6 h-6"></i>
                  <div class="flex-1">
                    <p class="text-sm font-bold text-red-800">Risco Crítico de Atraso de Expedição</p>

    }

    function renderFefo() {
      const maxQtd = Math.max(...fefoData.curvaVencimento.map(d => d.qtd));
      return `
        <div class="fade-in">
          <div class="mb-6">
            <h2 class="text-lg font-bold text-slate-800">Monitoramento de Validades (FEFO)</h2>
            <p class="text-sm text-slate-500">Análise de risco financeiro e distribuição de estoque por data de expiração.</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            ${KpiCard({ title: 'Produtos Vencidos', value: '3.2k', unit: 'itens', icon: 'alert-octagon', trend: 'up', trendValue: '+12% vs meta', alert: true, theme: 'red' })}
            ${KpiCard({ title: 'Vencimento Próximo (< 30d)', value: '15.8k', unit: 'itens', icon: 'calendar-clock', trend: 'down', trendValue: '-5% vs mês ant.', theme: 'amber' })}
            ${KpiCard({ title: 'Risco Financeiro Imediato', value: 'R$ 96k', unit: '', icon: 'dollar-sign', trend: 'up', trendValue: 'Em itens de alto risco', theme: 'indigo' })}
            ${KpiCard({ title: 'Acuracidade FEFO', value: '98.5', unit: '%', icon: 'shield-check', trend: 'up', trendValue: '+0.2% aderência', theme: 'green' })}
          </div>
          
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <div class="flex justify-between items-center mb-6">
                <div>
                  <h3 class="font-bold text-slate-800">Curva de Vencimento (Próximos 60+ dias)</h3>
                  <p class="text-sm text-slate-500">Volume de estoque distribuído por tempo restante de validade.</p>
                </div>
                <div class="p-2 bg-slate-50 rounded-lg text-slate-400"><i data-lucide="bar-chart-3" class="w-5 h-5"></i></div>
              </div>
              <div class="flex-1 flex items-end h-48 gap-3 mt-4">
                ${fefoData.curvaVencimento.map(item => `
                  <div class="flex flex-col items-center flex-1 group relative h-full justify-end">
                    <div class="absolute -top-12 bg-slate-800 text-white text-xs py-1.5 px-3 rounded shadow-lg hidden group-hover:flex flex-col items-center z-10 whitespace-nowrap">
                      <span class="font-bold">${item.qtd.toLocaleString('pt-BR')} un</span>
                      <span class="text-[10px] text-slate-300">Risco: ${item.vr}</span>
                    </div>
                    <div class="w-full rounded-t-md transition-all duration-500 ${item.color} opacity-85 group-hover:opacity-100 shadow-sm" style="height: ${(item.qtd / maxQtd) * 100}%; min-height: 10%;"></div>
                    <span class="text-[11px] text-slate-600 mt-3 font-semibold text-center h-8 leading-tight">${item.faixa}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <h3 class="font-bold text-slate-800 mb-1">Risco Financeiro por Setor</h3>
              <p class="text-sm text-slate-500 mb-6">Categorias com maior volume a vencer.</p>
              <div class="flex-1 flex flex-col gap-5 justify-center">
                ${fefoData.riscoSetor.map(setor => `
                  <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-end">
                      <span class="text-sm font-semibold text-slate-700">${setor.setor}</span>
                      <span class="text-sm font-bold text-slate-800">${setor.valorRisco}</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                      <div class="h-full rounded-full ${setor.status === 'Crítico' ? 'bg-red-500' : setor.status === 'Atenção' ? 'bg-orange-400' : 'bg-blue-400'}" style="width: ${setor.percent}%"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-slate-500 font-medium">
                      <span>${setor.status}</span>
                      <span>${setor.itensCriticos} itens mapeados</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // --- Lógica de Navegação ---

    const menuItemsConfig = [
      { id: 'dashboard', label: 'Visão Geral', icon: 'layout-dashboard', render: renderVisaoGeral },
      { id: 'recebimento', label: 'Recebimento', icon: 'arrow-down-to-line', render: renderRecebimento },
      { id: 'separacao', label: 'Separação', icon: 'shopping-cart', render: renderSeparacao },
      { id: 'expedicao', label: 'Expedição', icon: 'truck', render: renderExpedicao },
      { id: 'equipe', label: 'Produtividade', icon: 'users', render: renderProdutividade },
      { id: 'inventario', label: 'Gestão de Validade', icon: 'clipboard-list', render: renderFefo },
    ];

    let activeMenu = 'dashboard';

    function renderSidebar() {
      const sidebarHtml = menuItemsConfig.map(item => `
        <button
          onclick="setMenu('${item.id}')"
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${
            activeMenu === item.id 
              ? 'bg-blue-600 text-white' 
              : 'hover:bg-slate-800 hover:text-white'
          }"
        >
          <i data-lucide="${item.icon}" class="w-4 h-4"></i>
          ${item.label}
        </button>
      `).join('');
      document.getElementById('sidebar-menu').innerHTML = sidebarHtml;
      lucide.createIcons();
    }

    window.setMenu = function(menuId) {
      activeMenu = menuId;
      const config = menuItemsConfig.find(i => i.id === menuId);
      
      // Atualiza Título
      document.getElementById('header-title').innerText = config.label;
      
      // Renderiza Conteúdo
      document.getElementById('main-content').innerHTML = config.render();
      
      // Renderiza Sidebar para atualizar o estado "Ativo"
      renderSidebar();
      
      // Recria ícones para os elementos injetados na DOM
      lucide.createIcons();
    };

    // --- Inicialização ---
    document.addEventListener("DOMContentLoaded", () => {
      setMenu('dashboard');
    });

  </script>
</body>
</html>
