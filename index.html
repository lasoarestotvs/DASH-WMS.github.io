  <title>TOTVS WMS - Protótipo Desktop</title>
  
  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->

  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Transições suaves para o render do JS */
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="flex h-screen bg-slate-50 overflow-hidden">

  <!-- Sidebar Lateral -->

          />
        </div>
        <button class="relative p-2 text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-100">

          <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
      </div>
    </header>

    <!-- Conteúdo Rolável -->
    <div id="main-content" class="flex-1 overflow-y-auto p-8">
      <!-- O conteúdo das abas será injetado aqui via JS -->
    </div>

    const expedicaoData = {

      stageOut: [

      ],
      docas: [

        { id: 'Doca 04', veiculo: 'Camião Baú', placa: 'DEF-5678', rota: 'Rota Sul', progresso: 15, status: 'A Iniciar' },
      ],
      veiculosCarregados: [
        { loja: 'Loja 12 - Centro', veiculo: 'Camião (XYZ-9876)', paletes: 28, hora: '16:15', status: 'Aguardar NFe', statusColor: 'text-amber-600 bg-amber-50 border-amber-200' },
        { loja: 'Loja 05 - Bairro', veiculo: 'Carrinha (JKL-3456)', paletes: 12, hora: '15:30', status: 'Em Trânsito', statusColor: 'text-blue-700 bg-blue-50 border-blue-200' },
        { loja: 'Loja 08 - Shopping', veiculo: 'Camião (MNO-7890)', paletes: 24, hora: '14:45', status: 'Em Trânsito', statusColor: 'text-blue-700 bg-blue-50 border-blue-200' },
        { loja: 'Loja 02 - Express', veiculo: 'VUC (PQR-1234)', paletes: 8, hora: '16:40', status: 'Liberado Portaria', statusColor: 'text-emerald-700 bg-emerald-50 border-emerald-200' },
      ]
    };

    // --- Sistema de Temas e Componentes Base ---
    const baseThemes = {
      blue: { border: 'border-blue-600', bg: 'bg-blue-50', text: 'text-blue-600', bar: 'bg-blue-500', bulb: 'bg-blue-600' },
      red: { border: 'border-red-500', bg: 'bg-red-50', text: 'text-red-600', bar: 'bg-red-500', bulb: 'bg-red-600' },
      green: { border: 'border-emerald-500', bg: 'bg-emerald-50', text: 'text-emerald-600', bar: 'bg-emerald-500', bulb: 'bg-emerald-600' },
      purple: { border: 'border-purple-500', bg: 'bg-purple-50', text: 'text-purple-600', bar: 'bg-purple-500', bulb: 'bg-purple-600' },
      amber: { border: 'border-amber-500', bg: 'bg-amber-50', text: 'text-amber-600', bar: 'bg-amber-500', bulb: 'bg-amber-500' },
      indigo: { border: 'border-indigo-500', bg: 'bg-indigo-50', text: 'text-indigo-600', bar: 'bg-indigo-500', bulb: 'bg-indigo-500' },
    };

    function KpiCard({ title, value, unit, icon, trend, trendValue, alert, theme }) {
      const t = baseThemes[theme || (alert ? 'red' : 'blue')];
      const iconHtml = icon ? `<div class="p-2 rounded-lg ${t.bg} ${t.text}"><i data-lucide="${icon}" class="w-5 h-5"></i></div>` : '';
      const trendIcon = trend === 'up' ? '<i data-lucide="trending-up" class="w-3.5 h-3.5 mr-1"></i>' : trend === 'down' ? '<i data-lucide="trending-down" class="w-3.5 h-3.5 mr-1"></i>' : '';
      const trendClass = trend === 'up' ? 'text-green-600' : trend === 'down' ? 'text-red-500' : 'text-slate-400';

      return `
        <div class="bg-white p-4 rounded-xl border-l-4 shadow-sm flex flex-col justify-between ${t.border}">
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-slate-500 text-sm font-semibold">${title}</h3>
            ${iconHtml}
          </div>
          <div class="flex items-baseline gap-1">
            <span class="text-3xl font-bold text-slate-800">${value}</span>
            <span class="text-slate-500 text-sm">${unit}</span>
          </div>
          <div class="text-xs mt-2 flex items-center font-medium ${trendClass}">
            ${trendIcon} ${trendValue}
          </div>
        </div>
      `;
    }

    function VolumeProgressCard({ title, icon, agendados, conferidos, unitText, formatK = false, theme = 'blue', targetLabel = 'agendados' }) {
      const t = baseThemes[theme];
      const valConferidos = formatK ? (conferidos / 1000).toFixed(1) + 'k' : conferidos;
      const valAgendados = formatK ? (agendados / 1000).toFixed(1) + 'k' : agendados;
      const percent = Math.round((conferidos / agendados) * 100);
      const iconHtml = icon ? `<div class="p-2 rounded-lg ${t.bg} ${t.text}"><i data-lucide="${icon}" class="w-5 h-5"></i></div>` : '';

      return `
        <div class="bg-white p-4 rounded-xl border-l-4 shadow-sm flex flex-col justify-between ${t.border}">
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-slate-500 text-sm font-semibold">${title}</h3>
            ${iconHtml}
          </div>
          <div class="flex items-baseline gap-1">
            <span class="text-3xl font-bold text-slate-800">${valConferidos}</span>
            <span class="text-slate-500 text-sm">${unitText}</span>
          </div>
          <div class="mt-2">
            <div class="flex justify-between text-xs text-slate-500 mb-1">
              <span>de ${valAgendados} ${targetLabel}</span>
              <span class="font-bold ${t.text}">${percent}%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-1.5">
              <div class="h-1.5 rounded-full ${t.bar}" style="width: ${percent}%"></div>
            </div>
          </div>
        </div>
      `;
    }

    function ThermometerCard({ title, subtitle, value, unit, percentage, trend, trendValue, theme = 'blue', inverseTrend = false }) {
      const t = baseThemes[theme];
      let thermoTheme = theme;
      if (trend === 'up') {
        thermoTheme = inverseTrend ? 'red' : 'green';
      } else if (trend === 'down') {
        thermoTheme = inverseTrend ? 'green' : 'red';
      }
      const thermoT = baseThemes[thermoTheme];
      const safePct = Math.min(100, Math.max(0, percentage));
      const trendIcon = trend === 'up' ? '<i data-lucide="trending-up" class="w-3.5 h-3.5"></i>' : trend === 'down' ? '<i data-lucide="trending-down" class="w-3.5 h-3.5"></i>' : `<span class="inline-block w-2 h-2 rounded-full ${t.bar}"></span>`;
      const trendClass = thermoTheme === 'green' ? 'text-green-600' : thermoTheme === 'red' ? 'text-red-500' : 'text-slate-500';
      const trendText = trendValue || `${percentage}% ${thermoTheme === 'red' ? 'nível crítico' : 'da meta'}`;

      return `
        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between relative overflow-hidden group">
          <div class="absolute -right-4 -bottom-4 w-24 h-24 rounded-full opacity-[0.03] ${t.bar}"></div>
          <div class="flex flex-col justify-between h-full z-10 w-3/4">
            <div>
              <h3 class="text-slate-700 text-sm font-bold mb-0.5">${title}</h3>
              <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">${subtitle}</p>
            </div>
            <div class="mt-4 mb-1">
              <span class="text-3xl font-black ${t.text}">${value}</span>
              <span class="text-slate-500 text-sm ml-1 font-medium">${unit}</span>
            </div>
            <div class="flex items-center gap-1.5 text-xs font-semibold ${trendClass}">
               ${trendIcon} ${trendText}
            </div>
          </div>
          <div class="flex flex-col items-center justify-end h-28 w-12 pt-2 z-10">
            <div class="w-3.5 flex-1 bg-slate-100 rounded-t-full relative shadow-inner border border-slate-200/50 flex flex-col justify-end overflow-hidden z-0">
               <div class="absolute inset-0 flex flex-col justify-between py-1 opacity-20">
                 <div class="w-full h-[1px] bg-slate-800"></div><div class="w-full h-[1px] bg-slate-800"></div>
                 <div class="w-full h-[1px] bg-slate-800"></div><div class="w-full h-[1px] bg-slate-800"></div>
               </div>
               <div class="w-full transition-all duration-1000 relative ${thermoT.bar}" style="height: ${safePct}%">
                 <div class="absolute top-0 right-0 w-1/2 h-full bg-white/20"></div>
               </div>
               <div class="absolute top-[20%] left-0 w-full border-t-2 border-slate-800/30 z-10"></div>
            </div>
            <div class="w-8 h-8 rounded-full shadow-md -mt-2 z-10 border-2 border-white flex items-center justify-center relative ${thermoT.bulb}">
               <div class="absolute top-1 right-1 w-2.5 h-2.5 rounded-full bg-white/40 blur-[1px]"></div>
               <div class="absolute -inset-1 rounded-full opacity-20 animate-pulse ${thermoT.bar}"></div>
            </div>
          </div>
        </div>
      `;
    }

    function UnifiedVolumeCard({ title, icon, dia, hora, formatK = false, theme = 'blue' }) {
      const t = baseThemes[theme];
      const formatVal = (val) => formatK ? (val / 1000).toFixed(1).replace('.0', '') + 'k' : val;
      const pctDia = Math.round((dia.conferidos / dia.agendados) * 100);
      const pctHora = Math.round((hora.conferidos / hora.agendados) * 100);

      return `
        <div class="bg-white p-4 rounded-xl border-l-4 shadow-sm ${t.border} flex flex-col justify-between">
          <div class="flex items-center gap-2 mb-4">
            <div class="p-1.5 rounded-lg ${t.bg} ${t.text}"><i data-lucide="${icon}" class="w-4 h-4"></i></div>
            <h3 class="text-slate-800 text-sm font-bold">${title}</h3>
          </div>
          <div class="grid grid-cols-2 gap-3 divide-x divide-slate-100">
            <div class="pr-2">
              <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Dia</p>
              <div class="flex items-baseline gap-1 mb-2">
                <span class="text-2xl font-black text-slate-800">${formatVal(dia.conferidos)}</span>
                <span class="text-slate-500 text-[10px] font-medium">${dia.unit}</span>
              </div>
              <div class="flex justify-between text-[9px] text-slate-500 mb-1">
                <span>Média 30d: ${formatVal(dia.agendados)}</span>
                <span class="font-bold ${t.text}">${pctDia}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-1.5">
                <div class="h-1.5 rounded-full ${t.bar}" style="width: ${pctDia}%"></div>
              </div>
            </div>
            <div class="pl-3">
              <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Hora</p>
              <div class="flex items-baseline gap-1 mb-2">
                <span class="text-2xl font-black text-slate-800">${formatVal(hora.conferidos)}</span>
                <span class="text-slate-500 text-[10px] font-medium">${hora.unit}</span>
              </div>
              <div class="flex justify-between text-[9px] text-slate-500 mb-1">
                <span>Média 30d: ${formatVal(hora.agendados)}</span>
                <span class="font-bold ${t.text}">${pctHora}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-1.5">
                <div class="h-1.5 rounded-full ${t.bar}" style="width: ${pctHora}%"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function ArmazenagemCard() {
      return `
        <div class="bg-white p-4 rounded-xl border-l-4 shadow-sm border-emerald-500 flex flex-col justify-between h-full">
          <div class="flex items-start gap-2 mb-4">
            <div class="p-1.5 rounded-lg bg-emerald-50 text-emerald-600"><i data-lucide="archive-restore" class="w-4 h-4"></i></div>
            <div>
              <h3 class="text-slate-800 text-sm font-bold">Armazenagem</h3>
              <p class="text-[9px] text-slate-500 mt-0.5">Tempo Médio até ao destino</p>
            </div>
          </div>
          
          <div class="flex-1 flex flex-col justify-center">

              <div class="flex-1 flex flex-col justify-between">
                 <div class="flex-1 flex justify-center items-center gap-1.5 py-4">
                     <span class="text-5xl font-black text-slate-800 tracking-tight">${valorVolumeHoje}</span>
                     <span class="text-xl font-bold text-slate-500 self-end mb-1">cx/h</span>
                 </div>
                 <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mt-2">
                   <div class="flex justify-between items-center">
                     <div class="text-center w-full">
                       <span class="block text-xl font-bold text-slate-800">15.405</span>
                       <span class="block text-[10px] text-slate-500 font-medium uppercase mt-1">Itens<br>Processados</span>
                     </div>
                     <div class="w-px h-10 bg-slate-200"></div>
                     <div class="text-center w-full">
                       <span class="block text-xl font-bold text-slate-800">79h</span>
                       <span class="block text-[10px] text-slate-500 font-medium uppercase mt-1">Horas<br>Logadas</span>
                     </div>
                   </div>
                 </div>
                 <div class="mt-6 pt-4 border-t border-slate-100">
                   <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-3">Histórico Últimos 6 Dias</p>
                   <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                      ${produtividadeHistorico.map(hist => `
                        <div class="flex flex-col items-center p-2 rounded border border-slate-100 bg-white shadow-sm">
                          <span class="text-[9px] text-slate-500 font-bold uppercase">${hist.dia}</span>
                          <span class="text-[8px] text-slate-400 mb-1">${hist.data}</span>
                          <div class="flex flex-col items-center">
                            <span class="text-xs font-black ${hist.valor >= valorVolumeHoje ? 'text-emerald-600' : 'text-red-500'}">${hist.valor}</span>
                          </div>
                        </div>
                      `).join('')}
                   </div>
                 </div>
              </div>
            </div>

            <!-- CARD: Tempo Médio por Atividade -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <div class="mb-5">
                <div class="flex items-center gap-2 mb-1">
                  <i data-lucide="timer" class="text-green-500 w-5 h-5"></i>
                  <h3 class="font-bold text-slate-800">Tempo médio por atividade</h3>
                </div>
                <p class="text-[11px] text-slate-500 leading-relaxed mt-2">Duração média para completar uma tarefa do início ao fim.</p>
              </div>
              <div class="flex-1 flex flex-col justify-between">
                 <div class="flex-1 flex justify-center items-center py-4">
                     <span class="text-5xl font-black text-slate-800 tracking-tight">00h 01m 42s</span>
                 </div>
                 
                 <!-- Detalhamento -->
                 <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mt-2 mb-4">
                   <div class="flex justify-between items-center">
                     <div class="text-center w-full">
                       <span class="block text-xl font-bold text-slate-800">4.800</span>
                       <span class="block text-[10px] text-slate-500 font-medium uppercase mt-1">Atividades<br>Finalizadas</span>
                     </div>
                     <div class="w-px h-10 bg-slate-200"></div>
                     <div class="text-center w-full">
                       <span class="block text-xl font-bold text-slate-800">136h</span>
                       <span class="block text-[10px] text-slate-500 font-medium uppercase mt-1">Tempo Total<br>Utilizado</span>
                     </div>
                   </div>
                 </div>

                 <div class="mt-4 pt-4 border-t border-slate-100">
                   <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-3">Histórico Últimos 6 Dias</p>
                   <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                      ${tempoHistorico.map(hist => `
                        <div class="flex flex-col items-center p-2 rounded border border-slate-100 bg-white shadow-sm">
                          <span class="text-[9px] text-slate-500 font-bold uppercase">${hist.dia}</span>
                          <span class="text-[8px] text-slate-400 mb-1">${hist.data}</span>
                          <div class="flex flex-col items-center">
                            <span class="text-xs font-black ${hist.seg <= valorTempoHojeSeg ? 'text-emerald-600' : 'text-red-500'}">${hist.valor}</span>
                          </div>
                        </div>
                      `).join('')}
                   </div>
                 </div>
              </div>
            </div>
          </div>

          <!-- TABELA: PRODUTIVIDADE POR PRODUTIVO -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
              <div>
                <h3 class="font-bold text-slate-800">Produtividade por Produtivo</h3>
                <p class="text-sm text-slate-500">Métricas detalhadas de performance individual por colaborador no turno atual.</p>
              </div>
              <div class="p-1.5 bg-slate-200 rounded-lg cursor-pointer hover:bg-slate-300 transition-colors">
                <i data-lucide="filter" class="w-4 h-4 text-slate-600"></i>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-white border-b border-slate-200 text-[10px] uppercase tracking-wider text-slate-500">
                    <th class="px-6 py-4 font-bold">Produtivo (Nome)</th>
                    <th class="px-4 py-4 font-bold">Função</th>
                    <th class="px-4 py-4 font-bold text-center">Atividades Finalizadas</th>
                    <th class="px-4 py-4 font-bold text-center">Volumes</th>
                    <th class="px-4 py-4 font-bold text-center">Volumes / Hora</th>
                    <th class="px-4 py-4 font-bold text-center">Tempo Médio / Ativ.</th>
                    <th class="px-6 py-4 font-bold text-right">Comparativo (%)</th>
                  </tr>
                </thead>
                <tbody class="text-sm text-slate-700 divide-y divide-slate-100">
                  ${produtividadeTable.map(row => `
                    <tr class="hover:bg-slate-50 transition-colors">
                      <td class="px-6 py-4 font-bold text-slate-800 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-[10px]">
                          ${row.nome.split(' ').map(n => n[0]).join('')}
                        </div>
                        ${row.nome}
                      </td>
                      <td class="px-4 py-4 text-xs text-slate-600">${row.funcao}</td>
                      <td class="px-4 py-4 font-semibold text-center text-slate-800">${row.atividades}</td>
                      <td class="px-4 py-4 font-semibold text-center text-slate-800">${row.volumes} <span class="text-[10px] text-slate-400 font-normal">cx</span></td>
                      <td class="px-4 py-4 font-bold text-center text-blue-600">${row.caixasHora} <span class="text-[10px] font-normal text-slate-400">cx/h</span></td>
                      <td class="px-4 py-4 text-center font-mono text-xs text-slate-600 tracking-tight">${row.tempoMedio}</td>
                      <td class="px-6 py-4 text-right">
                        <span class="inline-flex items-center px-2 py-1 rounded text-xs font-bold ${row.comparativo >= 0 ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}">
                          ${row.comparativo >= 0 ? '<i data-lucide="trending-up" class="w-3 h-3 mr-1"></i>' : '<i data-lucide="trending-down" class="w-3 h-3 mr-1"></i>'}
                          ${row.comparativo >= 0 ? '+' : ''}${row.comparativo}%
                        </span>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function renderFefo() {
      const maxQtd = Math.max(...fefoData.curvaVencimento.map(d => d.qtd));
      return `
        <div class="fade-in">
          <div class="mb-6">
            <h2 class="text-lg font-bold text-slate-800">Monitorização de Validades (FEFO)</h2>
            <p class="text-sm text-slate-500">Análise de risco financeiro e distribuição de stock por expiração.</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            ${KpiCard({ title: 'Produtos Vencidos', value: '3.2k', unit: 'itens', icon: 'alert-octagon', trend: 'up', trendValue: '+12% vs meta', alert: true, theme: 'red' })}
            ${KpiCard({ title: 'Vencimento Próximo', value: '15.8k', unit: 'itens', icon: 'calendar-clock', trend: 'down', trendValue: '-5% vs mês ant.', theme: 'amber' })}
            ${KpiCard({ title: 'Risco Financeiro', value: 'R$ 96k', unit: '', icon: 'dollar-sign', trend: 'up', trendValue: 'Em itens de alto risco', theme: 'indigo' })}
            ${KpiCard({ title: 'Acuracidade FEFO', value: '98.5', unit: '%', icon: 'shield-check', trend: 'up', trendValue: '+0.2% aderência', theme: 'green' })}
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <div class="flex justify-between items-center mb-6">
                <div>
                  <h3 class="font-bold text-slate-800">Curva de Vencimento (Próximos 60+ dias)</h3>
                  <p class="text-sm text-slate-500">Volume de stock distribuído por tempo restante de validade.</p>
                </div>
                <div class="p-2 bg-slate-50 rounded-lg text-slate-400"><i data-lucide="bar-chart-3" class="w-5 h-5"></i></div>
              </div>
              <div class="flex-1 flex items-end h-48 gap-3 mt-4">
                ${fefoData.curvaVencimento.map(item => {
                  const valFormatado = item.qtd >= 1000 ? (item.qtd / 1000).toFixed(1).replace('.0', '') + 'k' : item.qtd;
                  return `
                  <div class="flex flex-col items-center flex-1 h-full justify-end group relative">
                    <div class="absolute -top-12 bg-slate-800 text-white text-xs py-1.5 px-3 rounded shadow-lg hidden group-hover:flex flex-col items-center z-10 whitespace-nowrap">
                      <span class="font-bold">${item.qtd.toLocaleString('pt-PT')} un</span>
                      <span class="text-[10px] text-slate-300">Risco: ${item.vr}</span>
                    </div>
                    <div class="w-full rounded-t-md transition-all duration-500 ${item.color} opacity-85 group-hover:opacity-100 shadow-sm flex justify-center pt-2 overflow-hidden" style="height: ${(item.qtd / maxQtd) * 100}%; min-height: 14%;">
                      <span class="text-white font-bold text-[10px] sm:text-xs tracking-wide">${valFormatado}</span>
                    </div>
                    <span class="text-[11px] text-slate-600 mt-3 font-semibold text-center leading-tight">${item.faixa}</span>
                  </div>
                `}).join('')}
              </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col">
              <h3 class="font-bold text-slate-800 mb-1">Risco Financeiro por Setor</h3>
              <p class="text-sm text-slate-500 mb-6">Categorias com maior volume a vencer.</p>
              <div class="flex-1 flex flex-col gap-5 justify-center">
                ${fefoData.riscoSetor.map(setor => `
                  <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-end">
                      <span class="text-sm font-semibold text-slate-700">${setor.setor}</span>
                      <span class="text-sm font-bold text-slate-800">${setor.valorRisco}</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                      <div class="h-full rounded-full ${setor.status === 'Crítico' ? 'bg-red-500' : setor.status === 'Atenção' ? 'bg-orange-400' : 'bg-blue-400'}" style="width: ${setor.percent}%"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-slate-500 font-medium">
                      <span>${setor.status}</span>
                      <span>${setor.itensCriticos} itens mapeados</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    const menuItemsConfig = [
      { id: 'dashboard', label: 'Visão Geral', icon: 'layout-dashboard', render: renderVisaoGeral },
      { id: 'recebimento', label: 'Recebimento', icon: 'arrow-down-to-line', render: renderRecebimento },
      { id: 'separacao', label: 'Separação', icon: 'shopping-cart', render: renderSeparacao },
      { id: 'expedicao', label: 'Expedição', icon: 'truck', render: renderExpedicao },
      { id: 'equipe', label: 'Produtividade', icon: 'users', render: renderProdutividade },
      { id: 'inventario', label: 'Gestão de Validade', icon: 'clipboard-list', render: renderFefo },
    ];

    let activeMenu = 'dashboard';

    function renderSidebar() {
      const sidebarHtml = menuItemsConfig.map(item => `
        <button
          onclick="setMenu('${item.id}')"
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${
            activeMenu === item.id 
              ? 'bg-blue-600 text-white shadow-lg' 
              : 'hover:bg-slate-800 hover:text-white'
          }"
        >
          <i data-lucide="${item.icon}" class="w-4 h-4"></i>
          ${item.label}
        </button>
      `).join('');
      document.getElementById('sidebar-menu').innerHTML = sidebarHtml;
      lucide.createIcons();
    }

    window.setMenu = function(menuId) {
      activeMenu = menuId;
      const config = menuItemsConfig.find(i => i.id === menuId);
      document.getElementById('header-title').innerText = config.label;
      document.getElementById('main-content').innerHTML = config.render();
      renderSidebar();
      lucide.createIcons();
      document.getElementById('main-content').scrollTop = 0;
    };

    document.addEventListener("DOMContentLoaded", () => {
      setMenu('dashboard');
    });
  </script>
</body>
</html>
